<!doctype html>
<html lang="en">
  <head>
    <title>10Pearls Extractor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="icon"
      type="image/logo"
      href="{{ url_for('static', filename='images/logo.jpg') }}"
    />
  </head>

  <body>
    <div class="main-container">
      <div class="left-panel">
        <img
          src="{{ url_for('static', filename='images/logo.jpg') }}"
          alt="Logo"
          class="logo"
        />

        <h1>Automate your forms</h1>

        <p class="subtitle">
          AI-powered document classification and extraction.
        </p>

        <button id="btn-auto" onclick="chooseFile('auto')">
          <span class="btn-text">Upload Document (CNIC / NAF)</span>
        </button>
      </div>

      <div class="right-panel hidden" id="resultPanel">
          <div class="result-header">
          <div class="result-title">
            <button class="new-upload-btn" onclick="closeResults()" title="Back to upload">
              &#8592;
            </button>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button class="download-btn hidden" id="downloadBtn" onclick="downloadJSON()" title="Download JSON">
              <img src="{{ url_for('static', filename='images/download.png') }}" alt="Download" />
            </button>
            <button class="download-btn" onclick="push_to_DB()">
              <img src="{{ url_for('static', filename='images/database.png') }}" alt="Save" title="Save to Database" />
            </button>
            <button class="close-btn" onclick="closeResults()" title="Close">
              &times;
            </button>
          </div>
        </div>

        <div id="status">Upload a document to begin processing.</div>
      </div>
    </div>

    <!-- Expand Modal -->
    <div id="expandModal" style="display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; backdrop-filter: blur(2px);">
      <div style="background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 600px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        <h3 id="expandModalTitle" style="margin-bottom: 16px; font-size: 12px; font-weight: bold; color: #64748b; letter-spacing: 0.05em;">EDITING FIELD</h3>
        <textarea id="expandTextarea" style="width: 100%; min-height: 180px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; resize: vertical; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#2563eb'"></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
          <button onclick="closeExpandModal()" style="padding: 10px 20px; background: white; color: #475569; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">Cancel</button>
          <button id="saveExpandBtn" style="padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 6px rgba(37,99,235,0.2); transition: background 0.2s;" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">Save Changes</button>
        </div>
      </div>
    </div>

    <input
      type="file"
      id="fileInputAuto"
      accept=".pdf,image/png,image/jpeg,image/jpg"
      multiple
      hidden
    />

    <script>
      let currentForm = "auto";

      function chooseFile(type) {
        currentForm = type;
        if (type === "auto") {
          document.getElementById("fileInputAuto").click();
        }
      }

      // button loading animation

      function setLoading(isLoading, type) {
        const buttons = document.querySelectorAll("button");
        const targetBtn = document.getElementById(`btn-${type}`);

        buttons.forEach((btn) => {
          btn.disabled = isLoading;
        });

        if (isLoading && targetBtn) {
          const textSpan = targetBtn.querySelector(".btn-text");
          const originalText = textSpan.innerText;
          targetBtn.dataset.originalText = originalText;

          targetBtn.innerHTML = `<div class="loader"></div> <span id="loading-text">Uploading document...</span>`;
        } else if (!isLoading && targetBtn) {
          targetBtn.innerHTML = `<span class="btn-text">${targetBtn.dataset.originalText}</span>`;
        }
      }

      function showResults() {
        document.getElementById("resultPanel").classList.remove("hidden");
        document.querySelector(".left-panel").classList.add("hidden");
      }

      function closeResults() {
        document.getElementById("resultPanel").classList.add("hidden");
        document.querySelector(".left-panel").classList.remove("hidden");
      }

      function handleUpload(event) {
        const files = event.target.files;

        if (files.length === 0) return;

        const data = new FormData();
        const statusDiv = document.getElementById("status");

        // Append all selected files to the form data
        for (let i = 0; i < files.length; i++) {
          data.append("files", files[i]);
        }

        showResults();
        document.getElementById("downloadBtn").classList.add("hidden");
        statusDiv.style.color = "#374151";
        statusDiv.innerHTML = `<div class="processing-state">
        <div class="spinner-large"></div>
          <p class="processing-text" id="proc-text">Uploading document...</p>
        </div>`;

        // Update result header
        // document.getElementById("resultTitle").innerText = "Document Extraction Results";

        setLoading(true, "auto");

        async function uploadAndProcess() {
          try {
            const response = await fetch("/upload/" + currentForm, {
              method: "POST",
              body: data,
            });

            if (!response.ok) {
              throw new Error("HTTP error " + response.status);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            const readStream = async () => {
              const { done, value } = await reader.read();
              if (done) return;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split("\n");
              buffer = lines.pop(); // Keep last incomplete line in buffer

              for (const line of lines) {
                if (line.trim()) {
                  try {
                    const res = JSON.parse(line);
                    if (res.status === "progress") {
                      // Update button loading text
                      const loadingTextEl =
                        document.getElementById("loading-text");
                      if (loadingTextEl) {
                        loadingTextEl.innerText = res.message;
                      }
                      // Update result panel processing text
                      const procTextEl = document.getElementById("proc-text");
                      if (procTextEl) {
                        procTextEl.innerText = res.message;
                      }
                    } else if (res.status === "success") {
                      setLoading(false, "auto");
                      statusDiv.style.color = "#111827";
                      // Update form type based on classification
                      if (res.classified_type) {
                        currentForm = res.classified_type;
                      }
                      window.lastExtractedData = res.data;
                      document.getElementById("downloadBtn").classList.remove("hidden");
                      statusDiv.innerHTML = renderFormResults(
                        res.data,
                        currentForm,
                      );
                    } else if (res.status === "error") {
                      setLoading(false, "auto");
                      statusDiv.style.color = "#b91c1c";
                      statusDiv.innerHTML = `<div class="error-state">
                                    <div class="error-icon">✕</div>
                                    <p class="error-msg">${res.message || "Extraction failed"}</p>
                                </div>`;
                    }
                  } catch (e) {
                    console.error("Failed to parse stream line:", e);
                  }
                }
              }
              await readStream();
            };
            await readStream();
          } catch (error) {
            console.error("Error during upload:", error);
            setLoading(false, "auto");
            statusDiv.style.color = "#b91c1c";
            statusDiv.innerHTML = `<div class="error-state">
                <div class="error-icon">✕</div>
                <p class="error-msg">A network error occurred. Please try again.</p>
            </div>`;
          } finally {
            event.target.value = "";
          }
        }
        uploadAndProcess();
      }

      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });
      document
        .getElementById("fileInputAuto")
        .addEventListener("change", handleUpload);

// ==========================================================================
// Pushing extracted data to the database and downloading JSON file functions
// ==========================================================================
      async function push_to_DB() {
        if (!window.lastExtractedData) {
          alert("No extracted data available to save.");
          return;
        }
        try {
          const response = await fetch(`/save-to-db/${currentForm}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(window.lastExtractedData)
          });
          if (response.ok) {
            const result = await response.json();
            alert(result.message || "Data saved to database successfully.");
          } else {
            const result = await response.json().catch(() => ({}));
            alert(result.message || 'Failed to save data to database.');
          }
        } catch (error) {
          alert('Error saving data to database: ' + error.message);
        }
      }

      async function downloadJSON() {
        if (!window.lastExtractedData) {
          alert("No extracted data available to download.");
          return;
        }
        try {
          const response = await fetch('/download-json', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(window.lastExtractedData)
          });
          if (response.ok) {
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `extracted_${currentForm}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
          } else {
            alert('Failed to download JSON from server.');
          }
        } catch (error) {
          console.error('Error downloading JSON:', error);
          alert('Error downloading JSON.');
        }
      }

      // ─── Expand Modal Logic ───────────────────────────────────────────────────────
      let currentExpandInput = null;
      let currentExpandPath = null;

      function openExpandModal(inputEl, path, label) {
        currentExpandInput = inputEl;
        currentExpandPath = path;
        document.getElementById('expandModalTitle').innerText = `EDITING ${label.toUpperCase()}`;
        document.getElementById('expandTextarea').value = inputEl.value;
        document.getElementById('expandModal').style.display = 'flex';
        document.getElementById('expandTextarea').focus();
      }

      function closeExpandModal() {
        document.getElementById('expandModal').style.display = 'none';
        currentExpandInput = null;
        currentExpandPath = null;
      }

      document.getElementById('saveExpandBtn').addEventListener('click', () => {
        if (currentExpandInput && currentExpandPath) {
          const newVal = document.getElementById('expandTextarea').value;
          currentExpandInput.value = newVal;
          updateCorrected(currentExpandPath, newVal);
        }
        closeExpandModal();
      });

      // ─── Rendering Engine ─────────────────────────────────────────────────────────

      function renderFormResults(data, formType) {
        if (Array.isArray(data)) {
          let html = "";
          data.forEach((doc, idx) => {
            if (data.length > 1) {
              html += `<div class="section-header">Document ${idx + 1}</div>`;
            }
            html += renderFlatFields(doc, `[${idx}]`);
          });
          return html;
        }
        return renderSections(data);
      }

      function updateCorrected(path, value) {
        // e.g. path = "section_1_basic_information.name"
        let parts = path.split(/[\.\[\]]+/).filter(Boolean);
        let obj = window.lastExtractedData;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!obj[parts[i]]) obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        let lastPart = parts[parts.length - 1];
        if (!obj[lastPart]) obj[lastPart] = {};
        if (!obj[lastPart].corrected) obj[lastPart].corrected = {};
        
        // If it has options, it might be a 'selected' field
        if (obj[lastPart].azure && obj[lastPart].azure.options) {
          obj[lastPart].corrected.selected = value;
        } else {
          obj[lastPart].corrected.value = value;
        }
      }

      function setInitialCorrected(path, azureObj) {
        let parts = path.split(/[\.\[\]]+/).filter(Boolean);
        let obj = window.lastExtractedData;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!obj[parts[i]]) obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        let lastPart = parts[parts.length - 1];
        if (!obj[lastPart]) obj[lastPart] = {};
        if (!obj[lastPart].corrected) {
           obj[lastPart].corrected = {};
           if (azureObj && azureObj.options) {
               obj[lastPart].corrected.selected = azureObj.selected || null;
           } else {
               obj[lastPart].corrected.value = azureObj ? azureObj.value : null;
           }
        }
      }

      function renderFlatFields(doc, basePath) {
        let rows = "";
        for (const [key, field] of Object.entries(doc)) {
          if (typeof field === "object" && field !== null && ("azure" in field || "value" in field)) {
            rows += fieldRow(formatName(key), field, `${basePath}.${key}`);
          }
        }
        return getTableWrapper(rows);
      }

      function renderSections(data) {
        let html = "";
        if (data.form_title) {
          html += `<div class="section-header" style="font-size: 14px; border-bottom: 2px solid #6366f1; margin-bottom: 20px; color: #0f172a; text-transform: none;">${data.form_title}</div>`;
        }

        if (data.family_takaful_need_analysis_of) {
          html += renderFieldGroup({ family_takaful_need_analysis_of: data.family_takaful_need_analysis_of }, "");
        }

        for (const [key, val] of Object.entries(data)) {
          if (key === "form_title" || key === "family_takaful_need_analysis_of") continue;

          const label = formatName(key);
          html += `<div class="section-header">${label}</div>`;

          if (Array.isArray(val)) {
            val.forEach((item, idx) => {
              html += `<div class="sub-section-label">Entry ${idx + 1}</div>`;
              html += renderFieldGroup(item, `${key}[${idx}]`);
            });
          } else if (typeof val === "object" && val !== null) {
            if ("azure" in val || "value" in val || "options" in val) {
              html += renderFieldGroup({ [key]: val }, "");
            } else {
              html += renderFieldGroup(val, key);
            }
          }
        }
        return html;
      }

      function renderFieldGroup(obj, basePath) {
        if (!obj || typeof obj !== "object") return "";
        let rows = "";
        for (const [key, field] of Object.entries(obj)) {
          const label = formatName(key);
          const currentPath = basePath ? `${basePath}.${key}` : key;

          if (field === null || field === undefined) {
            rows += fieldRow(label, null, currentPath);
          } else if (typeof field === "object") {
            if ("azure" in field || "glm" in field || "value" in field || "options" in field) {
              rows += fieldRow(label, field, currentPath);
            } else if (Array.isArray(field)) {
              if (field.length > 1) {
                rows += `<tr class="sub-group-header"><td colspan="4"><strong>${label}</strong></td></tr>`;
              }
              field.forEach((item, i) => {
                if (field.length > 1) {
                  rows += `<tr class="sub-group-header"><td colspan="4" style="padding-left:24px; color:#6366f1;">Entry ${i + 1}</td></tr>`;
                }
                if (typeof item === "object" && item !== null) {
                  for (const [sk, sv] of Object.entries(item)) {
                    if (sv && typeof sv === "object" && ("azure" in sv || "value" in sv || "options" in sv)) {
                      rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, sv, `${currentPath}[${i}].${sk}`);
                    } else if (sv === null || typeof sv !== "object") {
                      rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, { azure: { value: sv } }, `${currentPath}[${i}].${sk}`);
                    }
                  }
                }
              });
            } else {
              rows += `<tr class="sub-group-header"><td colspan="4"><strong>${label}</strong></td></tr>`;
              for (const [sk, sv] of Object.entries(field)) {
                if (sv && typeof sv === "object" && ("azure" in sv || "value" in sv || "options" in sv)) {
                  rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, sv, `${currentPath}.${sk}`);
                }
              }
            }
          } else {
            rows += fieldRow(label, { azure: { value: field } }, currentPath);
          }
        }
        if (!rows) return "";
        return getTableWrapper(rows);
      }

      function getTableWrapper(rows) {
        return `<div class="result-card">
                <table class="result-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Field</th>
                            <th style="width: 25%;">Azure AI</th>
                            <th style="width: 25%;">GLM-OCR</th>
                            <th style="width: 25%;">Human Corrected</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
      }

      function escapeHtml(unsafe) {
        if (unsafe === null || unsafe === undefined) return "";
        return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function getDisplayHtml(obj) {
        if (!obj) return `<em class="empty-val">—</em>`;
        if (obj.options) {
          return obj.options.map((opt) => {
            if (opt === obj.selected) {
              return `<span class="opt-badge selected-opt">✓ ${escapeHtml(opt)}</span>`;
            } else {
              return `<span class="opt-badge">☐ ${escapeHtml(opt)}</span>`;
            }
          }).join(" ");
        }
        if (obj.value !== null && obj.value !== undefined && obj.value !== "") {
          return escapeHtml(obj.value);
        }
        return `<em class="empty-val">—</em>`;
      }

      function getConfHtml(confidence) {
        if (confidence !== null && confidence !== undefined) {
          const pct = (confidence * 100).toFixed(1);
          let cls = confidence >= 0.8 ? "conf-high" : confidence >= 0.5 ? "conf-med" : "conf-low";
          return `<span class="conf-badge ${cls}">${pct}%</span>`;
        }
        return `<span class="conf-badge conf-na">N/A</span>`;
      }

      function fieldRow(label, fieldObj, path) {
        // Support legacy single-layer flat structure or new multi-layer structure
        let azure = (fieldObj && fieldObj.azure) ? fieldObj.azure : (fieldObj && (fieldObj.value !== undefined || fieldObj.options) ? fieldObj : {});
        let glm = (fieldObj && fieldObj.glm) ? fieldObj.glm : {};

        let azureHtml = getDisplayHtml(azure);
        let azureConf = getConfHtml(azure.confidence);

        let glmHtml = getDisplayHtml(glm);
        let glmConf = getConfHtml(glm.confidence);

        let correctedHtml = "";
        let defaultVal = azure.value !== undefined ? azure.value : (azure.selected !== undefined ? azure.selected : "");

        setInitialCorrected(path, azure);

        if (azure.options) {
          let opts = azure.options.map(opt => `<option value="${escapeHtml(opt)}" ${opt === defaultVal ? 'selected' : ''}>${escapeHtml(opt)}</option>`).join("");
          correctedHtml = `<select class="human-input" onchange="updateCorrected('${path}', this.value)">
              <option value="">-- Select --</option>
              ${opts}
          </select>`;
        } else {
          correctedHtml = `<input type="text" class="human-input" value="${escapeHtml(defaultVal)}" onchange="updateCorrected('${path}', this.value)" onclick="openExpandModal(this, '${path}', '${escapeHtml(label).replace(/'/g, "\\'")}')" style="cursor: pointer;" readonly placeholder="Click to edit..." />`;
        }

        return `<tr>
                <td class="field-label">${label}</td>
                <td class="field-value-col"><div class="val">${azureHtml}</div><div class="conf-wrap">${azureConf}</div></td>
                <td class="field-value-col"><div class="val">${glmHtml}</div><div class="conf-wrap">${glmConf}</div></td>
                <td class="field-human-col">${correctedHtml}</td>
            </tr>`;
      }

      function formatName(key) {
        return key.toString().replace(/^section_\d+_/, "").replace(/_/g, " ").replace(/\b\w/g, (l) => l.toUpperCase());
      }
    </script>
  </body>
</html>

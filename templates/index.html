<!DOCTYPE html>
<html lang="en">

<head>
    <title>10Pearls Extractor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/logo" href="{{ url_for('static', filename='images/logo.jpg') }}">
</head>

<body>

<div class="main-container">

    <div class="left-panel">

        <img src="{{ url_for('static', filename='images/logo.jpg') }}"
             alt="Logo"
             class="logo">

        <h1>Automate your forms</h1>

        <p class="subtitle">
            AI-powered document classification and extraction.
        </p>

        <button id="btn-naf" onclick="chooseFile('naf')">
            <span class="btn-text">Upload NAF Form (PDF)</span>
        </button>

        <button id="btn-proposal" onclick="chooseFile('proposal')">
            <span class="btn-text">Upload Insurance / Takaful Form (PDF)</span>
        </button>

        <button id="btn-cnic" onclick="chooseFile('cnic')">
            <span class="btn-text">Upload your CNIC (PDF or Images)</span>
        </button>

    </div>

    <div class="right-panel hidden" id="resultPanel">

        <div class="result-header">
            <div class="result-title">
                <div class="result-icon" id="resultIcon">✦</div>
                <h2 id="resultTitle">Extraction Results</h2>
            </div>
            <button class="close-btn" onclick="closeResults()" title="Close">
                &times;
            </button>
        </div>

        <div id="status">
            Upload a document to begin processing.
        </div>

    </div>

</div>

<input type="file" id="fileInputNaf" accept=".pdf" hidden>

<input type="file"
       id="fileInputCnic"
       accept=".pdf,image/png,image/jpeg,image/jpg"
       multiple
       hidden>

<script>

let currentForm = "";

function chooseFile(type){
    currentForm = type;
    if (type === 'cnic') {
        document.getElementById("fileInputCnic").click();
    } if (type === 'naf') {
        document.getElementById("fileInputNaf").click();
    }
    if (type === 'proposal') {
        alert("Coming Soon!")
    }
}

let loadingInterval;
const stages = ["Uploading document...", "Analyzing structure...", "Extracting fields...", "Finalizing..."];

function setLoading(isLoading, type) {
    const buttons = document.querySelectorAll("button");
    const targetBtn = document.getElementById(`btn-${type}`);
    
    buttons.forEach(btn => {
        btn.disabled = isLoading;
    });

    if (isLoading && targetBtn) {
        const textSpan = targetBtn.querySelector(".btn-text");
        const originalText = textSpan.innerText;
        targetBtn.dataset.originalText = originalText;
        
        let stageIndex = 0;
        targetBtn.innerHTML = `<div class="loader"></div> <span id="loading-text">${stages[0]}</span>`;
        
        loadingInterval = setInterval(() => {
            stageIndex = (stageIndex + 1) % stages.length;
            const textEl = document.getElementById("loading-text");
            if(textEl) textEl.innerText = stages[stageIndex];
        }, 2000);
    } else if (!isLoading && targetBtn) {
        clearInterval(loadingInterval);
        targetBtn.innerHTML = `<span class="btn-text">${targetBtn.dataset.originalText}</span>`;
    }
}

function showResults() {
    document.getElementById("resultPanel").classList.remove("hidden");
}

function closeResults() {
    document.getElementById("resultPanel").classList.add("hidden");
}

function handleUpload(event) {
    const files = event.target.files;

    if(files.length === 0) return;

    const data = new FormData();
    const statusDiv = document.getElementById("status");
    
    if (currentForm === "cnic") {
        if (files.length === 1) {
            if (!files[0].name.toLowerCase().endsWith(".pdf")) {
                alert("If uploading a single file for CNIC, it must be a PDF.");
                event.target.value = '';
                return;
            }
            data.append("pdf", files[0]);
        } else if (files.length === 2) {
            const isPdf = files[0].name.toLowerCase().endsWith(".pdf") || files[1].name.toLowerCase().endsWith(".pdf");
            if (isPdf) {
                alert("If uploading two files, both must be images (Front and Back).");
                event.target.value = '';
                return;
            }
            data.append("front_image", files[0]);
            data.append("back_image", files[1]);
        } else {
            alert("Please upload either a single PDF, or exactly two images (Front and Back side of CNIC).");
            event.target.value = '';
            return;
        }
    } else {
        const file = files[0];
        if (!file.name.toLowerCase().endsWith(".pdf")) {
            alert("Please select a PDF file.");
            event.target.value = '';
            return;
        }
        data.append("pdf", file);
    }

    showResults();
    statusDiv.style.color = "#374151";
    statusDiv.innerHTML = `<div class="processing-state">
        <div class="spinner-large"></div>
        <p class="processing-text" id="proc-text">Uploading document...</p>
    </div>`;

    // Update result header
    const formLabels = { cnic: "CNIC", naf: "NAF Form", proposal: "Insurance Form" };
    document.getElementById("resultTitle").innerText = `${formLabels[currentForm] || "Document"} Extraction Results`;

    setLoading(true, currentForm);

    fetch("/upload/" + currentForm,{
        method:"POST",
        body:data
    })
    .then(response => response.json().then(data => ({status: response.status, body: data})))
    .then(result => {
        setLoading(false, currentForm);
        
        if (result.status === 200 && result.body.status === "success") {
            statusDiv.style.color = "#111827";
            statusDiv.innerHTML = renderFormResults(result.body.data, currentForm);
        } else {
            statusDiv.style.color = "#b91c1c";
            statusDiv.innerHTML = `<div class="error-state">
                <div class="error-icon">✕</div>
                <p class="error-msg">${result.body.message || result.body.error || "Upload failed"}</p>
            </div>`;
        }
    })
    .catch(error => {
        setLoading(false, currentForm);
        statusDiv.style.color = "#b91c1c";
        statusDiv.innerHTML = `<div class="error-state">
            <div class="error-icon">✕</div>
            <p class="error-msg">${(error.response && error.response.status === 413) ? "File exceeds maximum upload size (10 MB)." : "A network error occurred. Please try again."}</p>
        </div>`;
    });
    
    event.target.value = '';
}

document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});
document.getElementById("fileInputNaf").addEventListener("change", handleUpload);
document.getElementById("fileInputCnic").addEventListener("change", handleUpload);

// ─── Rendering Engine ─────────────────────────────────────────────────────────

function renderFormResults(data, formType) {
    // CNIC returns an array of flat document objects
    if (Array.isArray(data)) {
        // Unwrap single-item array (CNIC case) — no index prefix
        let html = '';
        data.forEach((doc, idx) => {
            if (data.length > 1) {
                html += `<div class="section-header">Document ${idx + 1}</div>`;
            }
            html += renderFlatFields(doc);
        });
        return html;
    }

    // NAF / complex nested dict — render with section cards
    return renderSections(data);
}

function renderFlatFields(doc) {
    let rows = '';
    for (const [key, field] of Object.entries(doc)) {
        if (typeof field === 'object' && field !== null && ('value' in field || 'confidence' in field)) {
            rows += fieldRow(formatName(key), field.value, field.confidence);
        }
    }
    return `<div class="result-card">
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>Field</th>
                            <th>Extracted Value</th>
                            <th>Confidence</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
}

function renderSections(data) {
    let html = '';
    for (const [key, value] of Object.entries(data)) {
        if (key === 'form_title') continue;

        const sectionName = formatName(key);

        if (Array.isArray(value)) {
            // Table-like section (e.g., family_details, existing_plans)
            if (value.length === 0) continue;
            html += `<div class="section-header">${sectionName}</div>`;
            value.forEach((item, idx) => {
                if (value.length > 1) {
                    html += `<div class="sub-section-label">Entry ${idx + 1}</div>`;
                }
                html += renderFieldGroup(item);
            });

        } else if (typeof value === 'object' && value !== null) {
            // Check if it's a leaf value/confidence node
            if ('value' in value || 'confidence' in value || 'selected' in value) {
                // Top-level leaf — render as a single-field card
                html += `<div class="section-header">${sectionName}</div>`;
                html += `<div class="result-card"><table class="result-table"><tbody>`;
                let v = value.value !== undefined ? value.value : value.selected;
                html += fieldRow(sectionName, v, value.confidence);
                html += `</tbody></table></div>`;
            } else {
                // Nested section
                html += `<div class="section-header">${sectionName}</div>`;
                html += renderFieldGroup(value);
            }
        } else {
            // Primitive top-level value
            html += `<div class="section-header">${sectionName}</div>`;
            html += `<div class="result-card"><table class="result-table"><tbody>`;
            html += fieldRow(sectionName, value, null);
            html += `</tbody></table></div>`;
        }
    }
    return html;
}

function renderFieldGroup(obj) {
    if (!obj || typeof obj !== 'object') return '';
    let rows = '';
    for (const [key, field] of Object.entries(obj)) {
        const label = formatName(key);

        if (field === null || field === undefined) {
            rows += fieldRow(label, null, null);
        } else if (typeof field === 'object') {
            if ('value' in field || 'confidence' in field) {
                rows += fieldRow(label, field.value, field.confidence);
            } else if ('selected' in field) {
                rows += fieldRow(label, field.selected, field.confidence);
            } else if (Array.isArray(field)) {
                // Nested array inside a section — expand each item into proper rows
                if (field.length > 1) {
                    rows += `<tr class="sub-group-header"><td colspan="3"><strong>${label}</strong></td></tr>`;
                }
                field.forEach((item, i) => {
                    if (field.length > 1) {
                        rows += `<tr class="sub-group-header"><td colspan="3" style="padding-left:24px; color:#6366f1;">Entry ${i + 1}</td></tr>`;
                    }
                    if (typeof item === 'object' && item !== null) {
                        for (const [sk, sv] of Object.entries(item)) {
                            if (sv && typeof sv === 'object' && ('value' in sv || 'selected' in sv || 'confidence' in sv)) {
                                let v = sv.value !== undefined ? sv.value : sv.selected;
                                rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, v, sv.confidence);
                            } else if (sv === null || typeof sv !== 'object') {
                                rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, sv, null);
                            }
                        }
                    }
                });
            } else {
                // Deeper nested — recurse inline
                rows += `<tr class="sub-group-header"><td colspan="3"><strong>${label}</strong></td></tr>`;
                for (const [sk, sv] of Object.entries(field)) {
                    if (sv && typeof sv === 'object' && ('value' in sv || 'selected' in sv)) {
                        let v = sv.value !== undefined ? sv.value : sv.selected;
                        rows += fieldRow(`&nbsp;&nbsp;${formatName(sk)}`, v, sv.confidence);
                    }
                }
            }
        } else {
            rows += fieldRow(label, field, null);
        }
    }
    if (!rows) return '';
    return `<div class="result-card">
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>Field</th>
                            <th>Extracted Value</th>
                            <th>Confidence</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
}

function fieldRow(label, value, confidence) {
    let confHtml = '';
    if (confidence !== null && confidence !== undefined) {
        const pct = (confidence * 100).toFixed(1);
        let cls = confidence >= 0.8 ? 'conf-high' : confidence >= 0.5 ? 'conf-med' : 'conf-low';
        confHtml = `<span class="conf-badge ${cls}">${pct}%</span>`;
    } else {
        confHtml = `<span class="conf-badge conf-na">N/A</span>`;
    }

    const displayVal = (value !== null && value !== undefined && value !== '')
        ? value
        : `<em class="empty-val">—</em>`;

    return `<tr>
                <td class="field-label">${label}</td>
                <td class="field-value">${displayVal}</td>
                <td class="field-conf">${confHtml}</td>
            </tr>`;
}

function formatName(key) {
    return key.toString()
        .replace(/^section_\d+_/, '')   // Remove section_1_, section_2_ prefixes
        .replace(/_/g, ' ')
        .replace(/\b\w/g, l => l.toUpperCase());
}

</script>

</body>
</html>
